<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard</title>
    {% load static %}

    <style>
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .admin-table th {
            background: #67994f;
            color: white;
            padding: 14px 16px;
            text-align: left;
            font-size: 14px;
        }

        .admin-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .admin-table tr:hover {
            background: #f5f5f5;
        }

        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending {
            background: #c9e41b;
            color: #856404;
        }

        .btn-view {
            background: #007bff;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 5px;
        }

        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .dashboard-container {
            padding: 20px;
        }

        .dashboard-main {
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <h1>Admin Dashboard</h1>

        <div class="dashboard-main">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Name</th>
                        <th>Marks</th>
                        <th>Course</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for student in students %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td>{{ student.name }}</td>
                        <td>{{ student.mark }}</td>
                        <td>{{ student.course }}</td>
                        <td>
                            <span class="status status-pending">Pending</span>
                        </td>
                        <td>
                            <button class="btn-view">View</button>
                            <button class="btn-delete">Delete</button>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="6">No students found</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
